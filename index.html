<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Apartment Beatrice — családi apartman Mala Bijhányban, a kosonyi termálfürdők közelében. Nyugodt, családias szállás Kárpátalján.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Apartment Beatrice — Mala Bijhány, Kárpátalja">
  <meta property="og:description" content="Családi apartman a kosonyi termálfürdők közelében. Írj WhatsAppon a szabad időpontokért.">
  <meta property="og:image" content="assets/logo.jpg">
  <meta property="og:locale" content="hu_HU">
  <meta property="og:locale:alternate" content="uk_UA">
  <title>Apartment Beatrice — Mala Bijhány, Kárpátalja</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">

  <!-- base.css loads LAST — cascade order law C1 -->
  <link rel="stylesheet" href="base.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <img class="header__logo" src="assets/logo.jpg" alt="Apartment Beatrice">
    <nav class="lang" aria-label="Nyelv / Мова">
      <button class="lang__btn" data-lang="hu" aria-pressed="true">HU</button>
      <span class="lang__sep" aria-hidden="true">/</span>
      <button class="lang__btn" data-lang="ua" aria-pressed="false">UA</button>
    </nav>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero wrap">
    <div class="eyebrow" data-i18n="heroEyebrow"></div>
    <img class="hero__mark" src="assets/logo.jpg" alt="Apartment Beatrice — AB monogram">
    <svg class="swash" viewBox="0 0 220 36" aria-hidden="true">
      <path d="M6 26 C 46 2, 90 34, 130 10 S 196 2, 214 16" fill="none" stroke-width="2.5" stroke-linecap="round"></path>
    </svg>
    <p class="hero__tagline" data-i18n="heroTagline"></p>
    <p class="hero__sub" data-i18n="heroSubcopy"></p>
    <div class="cta-row">
      <a class="btn btn--primary" data-link="wa" target="_blank" rel="noopener" data-i18n="ctaWhatsapp"></a>
      <a class="btn btn--ghost" data-link="tel" data-i18n="ctaCall"></a>
      <a class="btn btn--ghost" data-link="maps" target="_blank" rel="noopener" data-i18n="ctaMaps"></a>
    </div>
    <div class="meta hero__price" data-i18n="priceLine"></div>
  </section>

  <!-- ===== HOST WELCOME (imperfection: handwritten voice, off-center) ===== -->
  <section class="band band--ink">
    <div class="wrap host">
      <div class="host__inner">
        <p class="host__note" data-i18n="hostWelcome"></p>
        <p class="host__signoff" data-i18n="hostSignoff"></p>
      </div>
    </div>
  </section>

  <!-- ===== ROOMS ===== -->
  <section class="band">
    <div class="wrap">
      <div class="section-head reveal">
        <svg class="swash swash--flip" viewBox="0 0 220 36" aria-hidden="true">
          <path d="M6 26 C 46 2, 90 34, 130 10 S 196 2, 214 16" fill="none" stroke-width="2.5" stroke-linecap="round"></path>
        </svg>
        <h2 data-i18n="roomsTitle"></h2>
      </div>
      <div class="room">
        <h3 data-i18n="room1Title"></h3>
        <p class="room__copy" data-i18n="room1Copy"></p>
        <div class="ph ph--43"><span class="ph__label" data-i18n="photoLabelInterior"></span></div>
      </div>
      <div class="room">
        <h3 data-i18n="room2Title"></h3>
        <p class="room__copy" data-i18n="room2Copy"></p>
        <div class="ph ph--43"><span class="ph__label" data-i18n="photoLabelKitchen"></span></div>
      </div>
    </div>
  </section>

  <!-- ===== GALLERY ===== -->
  <section class="band band--alt">
    <div class="wrap">
      <div class="section-head reveal" style="text-align:left">
        <h2 data-i18n="galleryTitle"></h2>
        <p class="meta" data-i18n="galleryNote"></p>
      </div>
      <div class="gallery">
        <div class="ph ph--wide ph--43"><span class="ph__label" data-i18n="photoLabelExterior"></span></div>
        <div class="ph ph--43"><span class="ph__label" data-i18n="photoLabelBedroom"></span></div>
        <div class="ph ph--43"><span class="ph__label" data-i18n="photoLabelBathroom"></span></div>
        <div class="ph ph--43"><span class="ph__label" data-i18n="photoLabelDetail"></span></div>
        <div class="ph ph--43"><span class="ph__label" data-i18n="photoLabelSprings"></span></div>
      </div>
    </div>
  </section>

  <!-- ===== LOCATION ===== -->
  <section class="band">
    <div class="wrap">
      <div class="section-head reveal" style="text-align:left">
        <h2 data-i18n="locationTitle"></h2>
      </div>
      <p data-i18n="locationCopy"></p>
      <div class="nap">
        <div data-i18n="napName"></div>
        <div data-i18n="napAddress"></div>
        <div data-i18n="napPhone"></div>
      </div>
      <div class="ph ph--11"><span class="ph__label" data-i18n="mapLabel"></span></div>
      <div class="cta-row" style="justify-content:flex-start">
        <a class="btn btn--ghost" data-link="maps" target="_blank" rel="noopener" data-i18n="ctaMaps"></a>
      </div>
    </div>
  </section>

  <!-- ===== BOOKING STRIP ===== -->
  <section class="band band--ink">
    <div class="wrap booking">
      <h2 data-i18n="bookingTitle"></h2>
      <p class="meta" data-i18n="priceLine"></p>
      <div class="cta-row">
        <a class="btn btn--primary" data-link="wa" target="_blank" rel="noopener" data-i18n="ctaWhatsapp"></a>
        <a class="btn btn--ghost" data-link="tel" data-i18n="ctaCall"></a>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <img class="footer__logo" src="assets/logo.jpg" alt="Apartment Beatrice">
    <div class="meta">
      <div data-i18n="napAddress"></div>
      <div><span data-i18n="napPhone"></span> · apartmentbeatrice@gmail.com</div>
      <div style="margin-top:8px">
        <a href="https://facebook.com/people/Apartment-Beatrice/61577018919822" target="_blank" rel="noopener">Facebook</a>
        <span aria-hidden="true"> · </span>
        <a href="https://instagram.com/apartmentbeatrice" target="_blank" rel="noopener">Instagram</a>
      </div>
    </div>
  </footer>

  <!-- ===== STICKY MOBILE CONVERSION BAR ===== -->
  <nav class="stickybar" aria-label="Foglalás / Бронювання">
    <a class="btn btn--primary" data-link="wa" target="_blank" rel="noopener" data-i18n="ctaWhatsapp"></a>
    <a class="btn btn--ghost" data-link="tel" data-i18n="ctaCall"></a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
